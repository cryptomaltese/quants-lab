name: "📋 Planning Task"
description: "Agent-executable planning/design task — NO implementation"
labels: ["planning"]
body:
  - type: textarea
    id: spec
    attributes:
      label: Planning Scope
      description: "What to plan. Be specific about decisions needed and constraints."
      placeholder: |
        Design the architecture for X.

        Constraints:
        - Must work with existing Y
        - Budget: Z
        - Timeline: W

        Output: write plan to `PLAN.md` or specified path
    validations:
      required: true

  - type: textarea
    id: phase-format
    attributes:
      label: "Phase Structure (Template)"
      description: "Each phase in your plan MUST follow this structure. Copy and adapt for each phase."
      value: |
        ## Phase N: [Phase Name]
        **Purpose:** [One sentence: what problem does this phase solve?]
        **Input:** [What this phase receives from prior phases or externals]
        **Output:** [Deliverables: files, decisions, data produced]
        **Owner:** [Sub-agent, human, or concurrent with another phase?]
        **Success Criteria:** [How to verify phase is done — measurable]
        **Dependencies:** [Prior phases, external work, human decisions]
        **Effort estimate:** [Small/Medium/Large or time box]
        **Open questions:** [Decisions that must be made during this phase]
        **Risks:** [What could fail? Mitigation?]
        
        Example:
        ## Phase 1: Research constraints
        **Purpose:** Understand system requirements before designing architecture.
        **Input:** Customer requirements doc, current codebase
        **Output:** `research/constraints-analysis.md` with findings; link to 3+ sources per finding
        **Owner:** Sub-agent (autonomous research)
        **Success Criteria:** 
        - [ ] ≥5 constraint types identified
        - [ ] Each constraint has ≥2 sources or internal validation
        - [ ] Contradictions documented with resolution path
        **Dependencies:** None (starts phase 1)
        **Effort:** Medium (4-6 hours)
        **Open questions:** Budget cap (hard limit or soft target?), timeline precedence
        **Risks:** Requirements may be conflicting; research phase will identify them

  - type: textarea
    id: success-criteria
    attributes:
      label: "Plan Success Criteria (Measurable)"
      description: "How do we know the plan is complete and executable? Use numbers: N phases, clarity metrics."
      placeholder: |
        Plan is complete when:
        - [ ] 3-7 phases defined (fewer = under-detailed, more = over-complex)
        - [ ] Each phase has explicit output and success criteria
        - [ ] All inter-phase dependencies mapped
        - [ ] No phase requires human decision mid-execution (humans decide BEFORE or AFTER phase)
        - [ ] Open questions section is non-empty (no plan claims completeness)
      validations:
        required: true

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: "Verifiable completion criteria. DO NOT add items beyond this list."
      value: |
        - [ ] All success criteria met
        - [ ] Plan written to specified output path
        - [ ] Each phase uses the Phase Structure template (with all fields filled)
        - [ ] Dependencies between phases are explicit
        - [ ] Open questions documented (don't paper over unknowns)
        - [ ] Plan is independently executable (no mid-phase human decisions)
        - [ ] Changes committed and pushed to remote
        - [ ] Closing comment posted (exact format below)
        - [ ] Issue closed via `gh issue close {NUMBER} --repo {REPO}`

  - type: textarea
    id: context
    attributes:
      label: Context & References
      description: "Links to prior work, constraints, relevant files, related decisions."
      placeholder: |
        - Previous plan: #38 (completed, see handoff comment for constraints)
        - Codebase: `builds/project/`
        - Constraints doc: `research/constraints.md`
        - ADR-07: [link to architectural decision]

  - type: textarea
    id: rules
    attributes:
      label: Agent Rules
      description: "Execution constraints for the agent."
      value: |
        - Do NOT implement code. Planning only.
        - Do NOT create issues or modify the dependency graph
        - Explore existing code and context BEFORE writing the plan (read relevant files, understand current architecture)
        - Each phase must be independently executable by a sub-agent with no human intervention
        - If a phase requires human action mid-execution, the plan is malformed — rewrite it to move human decision to before or after that phase
        - Stop planning when all phases are clear and executable; do NOT continue optimizing

        ## Self-Review (before closure)
        1. Re-read the Spec and Acceptance Criteria
        2. Verify EACH criterion individually (not just "tests pass")
        3. Check for scope creep: did you add anything NOT in the spec? Remove it.
        4. Check for missing work: did you skip anything IN the spec? Complete it.

        ## Closure Protocol (mandatory, exact order)
        **IMPORTANT: Push FIRST, then rebase, then open PR, then comment, then close. Never post a comment with an unpushed SHA.**

        1. `git add` + `git commit` + `git push` — push plan files to remote FIRST
        2. Rebase onto main:
           ```bash
           git fetch origin main && git rebase origin/main
           ```
           - If conflicts: resolve favoring your functional changes, preserving main's formatting
           - After resolving, force-push: `git push --force-with-lease`
           - If rebase fails after 2 attempts, push branch as-is with note in closing comment
        3. Open PR:
           ```bash
           gh pr create --base main --head feat/{issue-number}-{slug} \
             --title "#{issue-number}: {title}" \
             --body "Closes #{issue-number}"
           ```
        4. Post a closing comment via `gh issue comment {NUMBER} --repo {REPO}`:
           ```
           ## Completion
           **Commit:** {sha} (short hash, must be on remote)
           **PR:** #{pr-number}
           **Files:**
           - Created: [list of plan files]
           - Modified: [list of modified files]
           **Summary:** 2-3 sentence overview of plan structure and key phases
           **Plan structure:** [N phases, key milestones]
           **Critical dependencies:** [phases that must run serially; any that can be parallel]
           **Open questions:** [2-3 decisions needed before execution starts]
           **Next phase:** [if plan is multi-stage, what's the next planning task after this one executes?]
           **Verification:**
           - Criterion 1: [PASS] [evidence — e.g., test output snippet, metric value]
           - Criterion 2: [PASS] [evidence]
           ```
        5. `gh issue close {NUMBER} --repo {REPO}`

        Example:
        ```
        ## Completion
        **Commit:** abc1234
        **Files:**
        - Created: `PLAN.md`, `research/constraints-analysis.md`
        **Summary:** Designed 5-phase implementation plan for issue template redesign. Phases: Research (1), Design (2), Template Implementation (3), Testing (4), Deployment (5). All phases are independently executable; research is serial bottleneck.
        **Plan structure:** 5 phases (research → design → build → test → deploy). Phases 3-5 can overlap after phase 2.
        **Critical dependencies:** Phase 2 (Design) must wait for Phase 1 (Research). Phase 3 can start once Design is signed off.
        **Open questions:** (1) Should we support custom fields beyond standard YAML? (2) How many existing issues should we backfill with new templates? (3) Timeline for rollout: all at once or gradual?
        **Next phase:** After deployment, phase 6 (Monitoring) to be planned separately based on real usage data.
        **Verification:**
        - Criterion 1 (3-7 phases defined): [PASS] 5 phases defined in PLAN.md
        - Criterion 2 (each phase has output and criteria): [PASS] All 5 phases include Phase Structure with output and success criteria
        - Criterion 3 (dependencies mapped): [PASS] Dependency graph in section 4 shows all inter-phase dependencies
        ```
